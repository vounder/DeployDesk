name: Feature request
description: Suggest a focused improvement to DeployDesk.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Explain the operator or repository workflow that is difficult today.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful outcome, including safety or compatibility implications.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This keeps credentials out of `.deploylink` files and application state.
          required: true
        - label: I considered English and German UI behavior where applicable.
          required: true
